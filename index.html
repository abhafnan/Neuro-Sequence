<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEURO-SEQUENCE | High IQ Challenge</title>
    <meta name="description" content="Test your neural capacity with Neuro-Sequence. A high-stakes memory and IQ challenge for friends.">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="iq_game_favicon.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <div class="game-container">
            <div id="multiplayer-indicator" class="player-tag" style="display: none;">Player 1 Turn</div>
            
            <h1>NEURO SYNC</h1>
            <p class="subtitle">Neural Memory Interface</p>
            
            <div id="message" style="margin-bottom: 1rem; color: var(--accent-glow); font-weight: 600; height: 1.5rem;"></div>

            <div class="grid" id="game-grid">
                <!-- Cells generated by JS -->
            </div>

            <div id="controls">
                <button class="btn" id="start-btn">INITIALIZE NEURAL LINK</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <span>Level</span>
                    <b id="level-val">1</b>
                </div>
                <div class="stat-item">
                    <span>Best IQ</span>
                    <b id="best-val">0</b>
                </div>
            </div>
            
            <div style="margin-top: 1.5rem;">
                <button class="btn" id="multi-btn" style="background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim);">PASS & PLAY MODE</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
